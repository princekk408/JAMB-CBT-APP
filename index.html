<div id="boot-error" style="display:none; position:fixed; inset:0; background:#102a1f; color:#fff; padding:1.5em; font-family:monospace; font-size:14px; overflow:auto; z-index:9999; white-space:pre-wrap;"></div>
<script>
(function(){
  var errBox = document.getElementById('boot-error');
  var lines = [];
  function show(){ errBox.style.display = 'block'; errBox.textContent = lines.join('\n\n'); }
  window.addEventListener('error', function(e){
    lines.push('ERROR: ' + e.message + '\nFile: ' + e.filename + '\nLine: ' + e.lineno + ', Col: ' + e.colno);
    show();
  });
  window.addEventListener('unhandledrejection', function(e){
    lines.push('PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    show();
  });
  setTimeout(function(){
    var root = document.getElementById('root');
    if(root && root.innerHTML.trim() === ''){
      var report = ['App did not render. Library check:'];
      report.push('React loaded: ' + (typeof React !== 'undefined'));
      report.push('ReactDOM loaded: ' + (typeof ReactDOM !== 'undefined'));
      report.push('Babel loaded: ' + (typeof Babel !== 'undefined'));
      report.push('Supabase loaded: ' + (typeof window.supabase !== 'undefined'));
      report.push('jsPDF loaded: ' + (typeof window.jspdf !== 'undefined'));
      lines.push(report.join('\n'));
      show();
    }
  }, 4000);
})();
</script>

async function simpleHash(text){
  const enc = new TextEncoder().encode(text.trim().toLowerCase());
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function fmtTime(totalSeconds){
  const h = Math.floor(totalSeconds/3600);
  const m = Math.floor((totalSeconds%3600)/60);
  const s = totalSeconds%60;
  if(h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${m}:${String(s).padStart(2,"0")}`;
}

async function uploadImage(file){

}

// =====================================================================
// SCORING ENGINE
// Question distribution: 40% difficult, 45% moderate, 15% easy (of the
// question count actually used in a session).
// Marking scheme: difficult questions SHARE 60 marks, moderate SHARE 32
// marks, easy SHARE 8 marks -- out of 100 per subject, regardless of N.
// =====================================================================
function buildDifficultyPlan(totalQuestions){
  const difficultCount = Math.round(totalQuestions * 0.40);
  const moderateCount = Math.round(totalQuestions * 0.45);
  const easyCount = Math.max(totalQuestions - difficultCount - moderateCount, 0);
  return {
    difficult: { count: difficultCount, markPool: 60, markEach: difficultCount>0 ? 60/difficultCount : 0 },
    moderate: { count: moderateCount, markPool: 32, markEach: moderateCount>0 ? 32/moderateCount : 0 },
    easy: { count: easyCount, markPool: 8, markEach: easyCount>0 ? 8/easyCount : 0 },
  };
}

// Pick questions for a subject matching the required difficulty plan,
// from a pool of already-fetched questions (grouped by difficulty).
// seenIds: a Set of question IDs this user has already been served for
// this subject. Unseen questions are always preferred. If a specific
// DIFFICULTY TIER is fully exhausted (no unseen left in that tier, even
// though other tiers may still have unseen questions), that tier's seen
// history resets on its own -- this is more precise than resetting the
// whole subject at once, since a person might burn through "difficult"
// questions much faster than "easy" ones.
function pickQuestionsForPlan(pool, plan, seenIds){
  seenIds = seenIds || new Set();
  const byDiff = { easy: [], moderate: [], difficult: [] };
  pool.forEach(q => { if(byDiff[q.difficulty]) byDiff[q.difficulty].push(q); });

  const picked = [];
  const exhaustedTiers = [];
  ["difficult","moderate","easy"].forEach(diff=>{
    const need = plan[diff].count;
    let all = byDiff[diff];
    let unseen = all.filter(q => !seenIds.has(q.id));
    // this tier is exhausted: every question in it has been seen, but
    // there are enough total to attempt a real rotation -- reset just
    // this tier so the next pick can draw from the full tier again
    if(unseen.length < need && all.length >= need && all.length > 0 && unseen.length < all.length){
      const allSeenInTier = all.every(q => seenIds.has(q.id));
      if(allSeenInTier){
        exhaustedTiers.push(diff);
        unseen = all.slice(); // tier reset: treat everything as available again
      }
    }
    unseen = unseen.sort(()=>Math.random()-0.5);
    const seen = all.filter(q => seenIds.has(q.id) && !unseen.includes(q)).sort(()=>Math.random()-0.5);
    let chosen = unseen.slice(0, need);
    if(chosen.length < need){
      chosen = chosen.concat(seen.slice(0, need - chosen.length));
    }
    chosen.forEach(q => picked.push({ ...q, _markValue: plan[diff].markEach }));
  });
  picked._exhaustedTiers = exhaustedTiers;
  return picked.sort(()=>Math.random()-0.5);
}

// Fetch the set of question IDs this user has already seen for a subject.
// If the seen count covers the entire available pool for that subject
// (i.e. they've exhausted it), the history for that subject is cleared
// so they start seeing fresh-feeling rotations again.
async function getSeenQuestionIds(userId, subjectId, poolSize){
  const { data: seenRows } = await sb.from("jamb_seen_questions").select("question_id").eq("user_id", userId).eq("subject_id", subjectId);
  let seen = seenRows || [];
  if(poolSize > 0 && seen.length >= poolSize){
    await sb.from("jamb_seen_questions").delete().eq("user_id", userId).eq("subject_id", subjectId);
    seen = [];
  }
  return new Set(seen.map(r => r.question_id));
}

// Record questions just served to a user as "seen" (upsert avoids
// duplicate-key errors if a question is re-served after a reset).
async function recordSeenQuestions(userId, subjectId, questions){
  if(!questions || questions.length===0) return;
  const rows = questions.map(q => ({ user_id:userId, question_id:q.id, subject_id:subjectId }));
  await sb.from("jamb_seen_questions").upsert(rows, { onConflict: "user_id,question_id" });
}

// Given answered questions (each carrying _markValue), compute raw score
// out of 100, rounded to nearest whole number.
function scoreSubjectAttempt(questions, answers){
  let earned = 0;
  let correctCount = 0;
  questions.forEach(q=>{
    const sel = answers[q.id];
    if(sel && sel === q.correct_option){
      earned += q._markValue;
      correctCount++;
    }
  });
  return { rawScore: Math.round(earned), correctCount, total: questions.length };
}


function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,"0")}`;
}

// Returns the Date objects for this week's challenge window (Sat 10:00 to Sat 12:00)
function getChallengeWindow(){
  const now = new Date();
  const day = now.getDay(); // 0=Sun..6=Sat
  const daysUntilSat = (6 - day + 7) % 7;
  const saturday = new Date(now);
  saturday.setDate(now.getDate() + daysUntilSat);
  const start = new Date(saturday); start.setHours(10,0,0,0);
  const end = new Date(saturday); end.setHours(12,0,0,0);
  if(day === 6){
    // if it's already past this Saturday's window, point to next week's
    if(now > end){
      start.setDate(start.getDate()+7);
      end.setDate(end.getDate()+7);
    }
  }
  return { start, end, weekKey: getISOWeek(start) };
}

function App(){
  const [user, setUser] = useState(null);
  const [screen, setScreen] = useState("login");
  const [isAdmin, setIsAdmin] = useState(false);

  useEffect(()=>{
    const saved = localStorage.getItem("jamb_user");
    if(saved){
      try{ setUser(JSON.parse(saved)); setScreen("home"); }catch(e){}
    }
  },[]);

  function loginSuccess(u){
    setUser(u);
    localStorage.setItem("jamb_user", JSON.stringify(u));
    setScreen("home");
  }
  function logout(){
    setUser(null); setIsAdmin(false);
    localStorage.removeItem("jamb_user");
    setScreen("login");
  }

  if(!user){
    if(screen === "register") return <RegisterScreen onDone={()=>setScreen("login")} onBack={()=>setScreen("login")} />;
    if(screen === "forgot") return <ForgotPasswordScreen onBack={()=>setScreen("login")} />;
    return <LoginScreen onLogin={loginSuccess} onGoRegister={()=>setScreen("register")} onGoForgot={()=>setScreen("forgot")} />;
  }

  return <MainApp user={user} onLogout={logout} isAdmin={isAdmin} setIsAdmin={setIsAdmin} />;
}

function LoginScreen({ onLogin, onGoRegister, onGoForgot }){
  const [email,setEmail] = useState("");
  const [password,setPassword] = useState("");
  const [err,setErr] = useState("");
  const [loading,setLoading] = useState(false);

  async function handleSubmit(e){
    e.preventDefault();
    setErr(""); setLoading(true);
    try{
      const { data, error } = await sb.from("jamb_users").select("*").eq("email", email.trim().toLowerCase()).maybeSingle();
      if(error) throw error;
      if(!data){ setErr("No account found with that email."); setLoading(false); return; }
      const hash = await simpleHash(password);
      if(hash !== data.password_hash){ setErr("Incorrect password."); setLoading(false); return; }
      onLogin({ id:data.id, full_name:data.full_name, email:data.email, phone:data.phone });
    }catch(ex){
      setErr("Something went wrong logging in. Please try again.");
      console.error(ex);
    }
    setLoading(false);
  }

  return (
    <div className="center-screen">
      <div className="card auth-card">
        <div className="eyebrow">JAMB CBT Mock</div>
        <h1>Mock App</h1>
        <p className="muted">Sign in to start practicing.</p>
        {err && <div className="error-box">{err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="field">
            <label>Email</label>
            <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
          </div>
          <div className="field">
            <label>Password</label>
            <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" />
          </div>
          <button type="submit" className="btn-primary" style={{width:"100%"}} disabled={loading}>
            {loading ? <span className="spinner"></span> : "Sign in"}
          </button>
        </form>
        <div className="divider"></div>
        <div className="flex-between">
          <button className="btn-ghost" onClick={onGoForgot}>Forgot password?</button>
          <button className="btn-ghost" onClick={onGoRegister}>Create account</button>
        </div>
      </div>
    </div>
  );
}

function RegisterScreen({ onDone, onBack }){
  const [form,setForm] = useState({
    full_name:"", email:"", phone:"", password:"", confirm:"",
    security_question: SECURITY_QUESTIONS[0], security_answer:""
  });
  const [err,setErr] = useState("");
  const [loading,setLoading] = useState(false);

  function update(field,val){ setForm(f=>({...f,[field]:val})); }

  async function handleSubmit(e){
    e.preventDefault();
    setErr("");
    if(form.password.length < 4){ setErr("Password should be at least 4 characters."); return; }
    if(form.password !== form.confirm){ setErr("Passwords do not match."); return; }
    if(!form.security_answer.trim()){ setErr("Please answer the security question."); return; }
    setLoading(true);
    try{
      const { data: existing } = await sb.from("jamb_users").select("id").eq("email", form.email.trim().toLowerCase()).maybeSingle();
      if(existing){ setErr("An account with that email already exists."); setLoading(false); return; }
      const password_hash = await simpleHash(form.password);
      const security_answer_hash = await simpleHash(form.security_answer);
      const { error } = await sb.from("jamb_users").insert({
        full_name: form.full_name.trim(), email: form.email.trim().toLowerCase(), phone: form.phone.trim(),
        password_hash, security_question: form.security_question, security_answer_hash
      });
      if(error) throw error;
      onDone();
    }catch(ex){ setErr("Could not create account. Please try again."); console.error(ex); }
    setLoading(false);
  }

  return (
    <div className="center-screen">
      <div className="card auth-card">
        <div className="eyebrow">Create account</div>
        <h1>Join the mock app</h1>
        {err && <div className="error-box">{err}</div>}

function ForgotPasswordScreen({ onBack }){
  const [step,setStep] = useState(1);
  const [email,setEmail] = useState("");
  const [userRec,setUserRec] = useState(null);
  const [answer,setAnswer] = useState("");
  const [newPassword,setNewPassword] = useState("");
  const [confirm,setConfirm] = useState("");
  const [err,setErr] = useState("");
  const [success,setSuccess] = useState("");
  const [loading,setLoading] = useState(false);

  async function findUser(e){
    e.preventDefault(); setErr(""); setLoading(true);
    const { data, error } = await sb.from("jamb_users").select("*").eq("email", email.trim().toLowerCase()).maybeSingle();
    setLoading(false);
    if(error || !data){ setErr("No account found with that email."); return; }
    setUserRec(data); setStep(2);
  }
  async function checkAnswer(e){
    e.preventDefault(); setErr(""); setLoading(true);
    const hash = await simpleHash(answer);
    setLoading(false);
    if(hash !== userRec.security_answer_hash){ setErr("That answer doesn't match our records."); return; }
    setStep(3);
  }
  async function resetPassword(e){
    e.preventDefault(); setErr("");
    if(newPassword.length < 4){ setErr("Password should be at least 4 characters."); return; }
    if(newPassword !== confirm){ setErr("Passwords do not match."); return; }
    setLoading(true);
    const password_hash = await simpleHash(newPassword);
    const { error } = await sb.from("jamb_users").update({ password_hash }).eq("id", userRec.id);
    setLoading(false);
    if(error){ setErr("Could not reset password. Try again."); return; }
    setSuccess("Password reset. You can sign in now.");
  }

  return (
    <div className="center-screen">
      <div className="card auth-card">
        <div className="eyebrow">Account recovery</div>
        <h1>Reset password</h1>
        {err && <div className="error-box">{err}</div>}
        {success && <div className="success-box">{success}</div>}
        {!success && step===1 && (
          <form onSubmit={findUser}>
            <div className="field"><label>Email</label><input type="email" required value={email} onChange={e=>setEmail(e.target.value)} /></div>
            <button className="btn-primary" style={{width:"100%"}} disabled={loading}>{loading?<span className="spinner"></span>:"Continue"}</button>
          </form>
        )}
        {!success && step===2 && (
          <form onSubmit={checkAnswer}>
            <p><strong>{userRec.security_question}</strong></p>
            <div className="field"><label>Your answer</label><input required value={answer} onChange={e=>setAnswer(e.target.value)} /></div>
            <button className="btn-primary" style={{width:"100%"}} disabled={loading}>{loading?<span className="spinner"></span>:"Verify"}</button>
          </form>
        )}
        {!success && step===3 && (
          <form onSubmit={resetPassword}>
            <div className="field"><label>New password</label><input type="password" required value={newPassword} onChange={e=>setNewPassword(e.target.value)} /></div>
            <div className="field"><label>Confirm new password</label><input type="password" required value={confirm} onChange={e=>setConfirm(e.target.value)} /></div>
            <button className="btn-primary" style={{width:"100%"}} disabled={loading}>{loading?<span className="spinner"></span>:"Reset password"}</button>
          </form>
        )}
        <div className="divider"></div>
        <button className="btn-ghost" onClick={onBack}>Back to sign in</button>
      </div>
    </div>
  );
}

// MOCK EXAM MODE
// English (compulsory, 60Q) + 3 chosen subjects (40Q each) = 180Q, 2hrs
// =====================================================================
function MockFlow({ user, onExit }){
  const [stage,setStage] = useState("setup");
  const [bundle,setBundle] = useState(null);
  const [result,setResult] = useState(null);

  if(stage==="setup") return <MockSetup user={user} onStart={(b)=>{setBundle(b); setStage("exam");}} onExit={onExit} />;
  if(stage==="exam") return <MultiSubjectExam bundle={bundle} user={user} mode="mock" onFinish={(r)=>{setResult(r); setStage("results");}} />;
  if(stage==="results") return <MultiSubjectResults result={result} user={user} onExit={onExit} />;
}

function MockSetup({ user, onStart, onExit }){
  const [subjects,setSubjects] = useState([]);
  const [chosen,setChosen] = useState([]); // 3 non-English subject ids
  const [loading,setLoading] = useState(true);
  const [err,setErr] = useState("");
  const [preparing,setPreparing] = useState(false);

  useEffect(()=>{ (async()=>{
    const { data } = await sb.from("jamb_subjects").select("*").order("name");
    setSubjects(data||[]);
    setLoading(false);
  })(); },[]);

  const english = subjects.find(s=>s.is_compulsory);
  const others = subjects.filter(s=>!s.is_compulsory);

  function toggle(id){
    setChosen(prev=>{
      if(prev.includes(id)) return prev.filter(x=>x!==id);
      if(prev.length>=3){ setErr("You can only choose 3 subjects besides English."); return prev; }
      setErr("");
      return [...prev, id];
    });
  }

  async function handleStart(){
    if(!english){ setErr("English subject not found — check your subject list in Admin."); return; }
    if(chosen.length !== 3){ setErr("Please choose exactly 3 subjects."); return; }
    setErr(""); setPreparing(true);
    const subjectPlan = [
      { subject: english, questionCount: 60 },
      ...chosen.map(id => ({ subject: subjects.find(s=>s.id===id), questionCount: 40 }))
    ];
    const subjectData = [];
    for(const sp of subjectPlan){
      const { data: pool } = await sb.from("jamb_questions").select("*").eq("subject_id", sp.subject.id);
      if(!pool || pool.length===0){ setErr(`No questions found for ${sp.subject.name} yet.`); setPreparing(false); return; }
      const plan = buildDifficultyPlan(sp.questionCount);
      const seenIds = await getSeenQuestionIds(user.id, sp.subject.id, pool.length);
      const picked = pickQuestionsForPlan(pool, plan, seenIds);
      if(picked.length < sp.questionCount * 0.5){ setErr(`Not enough questions across difficulty levels for ${sp.subject.name} — only ${picked.length} of ${sp.questionCount} could be filled. Add more questions in Admin.`); setPreparing(false); return; }
      await recordSeenQuestions(user.id, sp.subject.id, picked);
      subjectData.push({ subject: sp.subject, questions: picked, plan });
    }
    setPreparing(false);
    onStart({ subjectData, durationSeconds: 2*3600 });
  }

  if(loading) return <div className="empty-state"><span className="spinner"></span></div>;

  return (
    <div>
      <button className="btn-ghost" onClick={onExit}>← Back</button>
      <h1>Mock Exam</h1>
      <p className="muted">English Language is compulsory (60 questions). Choose 3 more subjects (40 questions each). Total: 180 questions, 2 hours, graded over 400.</p>
      {err && <div className="error-box">{err}</div>}
      <div className="card">
        <div className="field">
          <label>Compulsory subject</label>
          <span className="tag">{english ? english.name : "English not found"}</span>
        </div>
        <div className="field">
          <label>Choose 3 other subjects ({chosen.length}/3 selected)</label>
          <div className="flex-row">
            {others.map(s=>(
              <span key={s.id} className={"subject-pill"+(chosen.includes(s.id)?" active":"")} onClick={()=>toggle(s.id)}>{s.name}</span>
            ))}
          </div>
        </div>
        <button className="btn-primary" onClick={handleStart} disabled={preparing}>{preparing?<span className="spinner"></span>:"Start mock exam"}</button>
      </div>
    </div>
  );
}

// Reusable exam runner for multi-subject sessions (Mock, Weekly Challenge,
// and multi-subject Practice mode all use this)
function MultiSubjectExam({ bundle, user, mode, challengeWeek, onFinish }){
  const { subjectData, durationSeconds } = bundle;
  const [subjIndex,setSubjIndex] = useState(0);
  const [qIndex,setQIndex] = useState(0);
  const [answers,setAnswers] = useState({}); // questionId -> option
  const [timeLeft,setTimeLeft] = useState(durationSeconds);
  const submittedRef = useRef(false);

  const handleSubmit = useCallback(async (autoSubmitReason)=>{
    if(submittedRef.current) return;
    submittedRef.current = true;
    const perSubject = subjectData.map(sd=>{
      const { rawScore, correctCount, total } = scoreSubjectAttempt(sd.questions, answers);
      return { subject: sd.subject, rawScore, correctCount, total };
    });
    const totalScore = perSubject.reduce((s,r)=>s+r.rawScore, 0);
    const maxScore = perSubject.length * 100;

    const responses = [];
    // Full snapshot per subject: every question with its options, the
    // correct answer, explanation, what the user picked, and whether it
    // was right -- so History can show this exact review later even if
    // the admin edits or deletes the original question afterward.
    const snapshotPerSubject = subjectData.map(sd=>{
      const questionSnapshots = sd.questions.map(q=>{
        const sel = answers[q.id];
        const isCorrect = sel === q.correct_option;
        responses.push({ question_id:q.id, selected_option: sel||null, is_correct:isCorrect, marks_awarded: isCorrect? q._markValue : 0 });
        return {
          id:q.id, question_text:q.question_text, image_url:q.image_url||null,
          option_a:q.option_a, option_b:q.option_b, option_c:q.option_c, option_d:q.option_d, option_e:q.option_e||null,
          correct_option:q.correct_option, explanation:q.explanation||null, difficulty:q.difficulty,
          selected_option: sel||null, is_correct:isCorrect, mark_value:q._markValue
        };
      });
      const { rawScore, correctCount, total } = scoreSubjectAttempt(sd.questions, answers);
      return { code:sd.subject.code, name:sd.subject.name, rawScore, correct:correctCount, total, questions: questionSnapshots };
    });

    const { data: attempt } = await sb.from("jamb_attempts").insert({
      user_id:user.id, mode, challenge_week: challengeWeek || null,
      total_score: totalScore, max_score: maxScore,
      submitted_at: new Date().toISOString(), duration_seconds: durationSeconds-timeLeft,
      details: { perSubject: snapshotPerSubject, autoSubmitted: autoSubmitReason || null }
    }).select().single();
    if(attempt){
      const rows = responses.map(r=>({...r, attempt_id: attempt.id}));
      await sb.from("jamb_attempt_responses").insert(rows);
    }
    onFinish({ perSubject, totalScore, maxScore, subjectData, answers, attemptId: attempt?.id, snapshotPerSubject });
  },[subjectData, answers, mode, challengeWeek, user, durationSeconds, timeLeft, onFinish]);

  useEffect(()=>{
    if(timeLeft<=0){ handleSubmit("time_up"); return; }
    const t = setTimeout(()=>setTimeLeft(s=>s-1),1000);
    return ()=>clearTimeout(t);
  },[timeLeft, handleSubmit]);

  const sd = subjectData[subjIndex];
  const q = sd.questions[qIndex];

  function switchSubject(i){ setSubjIndex(i); setQIndex(0); }

  return (
    <AntiCheatWrapper onForceSubmit={()=>handleSubmit("left_screen")}>
    <div>
      <div className="flex-between no-print">
        <h2 style={{margin:0}}>{({mock:"Mock Exam",weekly_challenge:"Weekly Challenge",practice:"Practice"})[mode] || "Exam"}</h2>
        <span className={"timer-badge"+(timeLeft<300?" low":"")}>{fmtTime(timeLeft)}</span>
      </div>
      <div className="flex-row" style={{margin:"1em 0",flexWrap:"wrap"}}>
        {subjectData.map((s,i)=>(
          <span key={s.subject.id} className={"subject-pill"+(i===subjIndex?" active":"")} onClick={()=>switchSubject(i)}>{s.subject.name}</span>
        ))}
      </div>
      <div className="card">
        <div className="flex-between">
          <p className="muted">{sd.subject.name} · Question {qIndex+1} of {sd.questions.length}</p>
          <span className={"diff-badge diff-"+q.difficulty}>{q.difficulty}</span>
        </div>
        <p style={{fontWeight:600,fontSize:"1.05rem"}}>{q.question_text}</p>
        {q.image_url && <img className="q-image" src={q.image_url} alt="" />}
        {[["A",q.option_a],["B",q.option_b],["C",q.option_c],["D",q.option_d], ...(q.option_e?[["E",q.option_e]]:[])].map(([label,text])=>(
          <div key={label} className={"option-row"+(answers[q.id]===label?" selected":"")} onClick={()=>setAnswers(a=>({...a,[q.id]:label}))}>
            <input type="radio" readOnly checked={answers[q.id]===label} />
            <span><strong>{label}.</strong> {text}</span>
          </div>
        ))}
      </div>
      <div className="flex-between">
        <button className="btn-secondary" disabled={qIndex===0} onClick={()=>setQIndex(i=>i-1)}>← Previous</button>
        <span className="muted">{sd.subject.code} progress: {qIndex+1}/{sd.questions.length}</span>
        {qIndex < sd.questions.length-1
          ? <button className="btn-secondary" onClick={()=>setQIndex(i=>i+1)}>Next →</button>
          : (subjIndex < subjectData.length-1
              ? <button className="btn-secondary" onClick={()=>switchSubject(subjIndex+1)}>Next subject →</button>
              : <button className="btn-primary" onClick={()=>handleSubmit("manual")}>Submit exam</button>)}
      </div>
    </div>
    </AntiCheatWrapper>
  );
}

function MultiSubjectResults({ result, user, onExit }){
  const { totalScore, maxScore, snapshotPerSubject } = result;
  return <AttemptReview perSubject={snapshotPerSubject} totalScore={totalScore} maxScore={maxScore} user={user} onExit={onExit} title="Mock Result" />;
}

// Shared review UI: score table + full question-by-question breakdown
// with correct/incorrect highlighting and explanations. Used both right
// after submitting and later from History (since perSubject snapshots
// are stored permanently in jamb_attempts.details).
function AttemptReview({ perSubject, totalScore, maxScore, user, onExit, title }){
  const [subjFilter,setSubjFilter] = useState("all");

  function handlePrint(){ window.print(); }
  function handleSavePDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16); doc.text(title || "JAMB Result", 14, 18);
    doc.setFontSize(11);
    doc.text(`Name: ${user.full_name}`, 14, 28);
    doc.text(`Date: ${new Date().toLocaleDateString()}`, 14, 35);
    let y = 48;
    doc.setFontSize(12);
    doc.text("Subject", 14, y); doc.text("Score (/100)", 100, y); doc.text("Correct", 150, y);
    y += 6; doc.line(14,y,196,y); y += 6;
    perSubject.forEach(r=>{
      doc.text(r.name, 14, y);
      doc.text(String(r.rawScore), 100, y);
      doc.text(`${r.correct}/${r.total}`, 150, y);
      y += 7;
    });
    y += 4; doc.line(14,y,196,y); y += 8;
    doc.setFontSize(14); doc.text(`Total: ${totalScore} / ${maxScore}`, 14, y);
    doc.save(`${user.full_name.replace(/\s+/g,"_")}_jamb_result.pdf`);
  }

  const visibleSubjects = subjFilter==="all" ? perSubject : perSubject.filter(s=>s.code===subjFilter);

  return (
    <div>
      <h1>{title || "Result"}</h1>
      <div className="card">
        <p><strong>{user.full_name}</strong> · {new Date().toLocaleDateString()}</p>
        <table>
          <thead><tr><th>Subject</th><th>Score (/100)</th><th>Correct</th></tr></thead>
          <tbody>
            {perSubject.map(r=>(
              <tr key={r.code}><td>{r.name}</td><td>{r.rawScore}</td><td>{r.correct}/{r.total}</td></tr>
            ))}
          </tbody>
        </table>
        <div className="divider"></div>
        <h2>{totalScore} / {maxScore}</h2>
      </div>
      <div className="flex-row no-print">
        <button className="btn-secondary" onClick={handlePrint}>Print result</button>
        <button className="btn-secondary" onClick={handleSavePDF}>Save as PDF</button>
        <button className="btn-primary" onClick={onExit}>Back to home</button>
      </div>

      <div className="divider"></div>
      <h2>Question Review</h2>
      <p className="muted">See exactly what you answered, what was correct, and the explanation for each question.</p>
      <div className="flex-row no-print" style={{marginBottom:"1em"}}>
        <span className={"subject-pill"+(subjFilter==="all"?" active":"")} onClick={()=>setSubjFilter("all")}>All subjects</span>
        {perSubject.map(s=> <span key={s.code} className={"subject-pill"+(subjFilter===s.code?" active":"")} onClick={()=>setSubjFilter(s.code)}>{s.name}</span>)}
      </div>

      {visibleSubjects.map(sd=>(
        <div key={sd.code}>
          <h3>{sd.name} — {sd.correct}/{sd.total} correct ({sd.rawScore}/100)</h3>
          {sd.questions.map((q,i)=>{
            const options = [["A",q.option_a],["B",q.option_b],["C",q.option_c],["D",q.option_d], ...(q.option_e?[["E",q.option_e]]:[])];
            return (
              <div key={q.id} className="card question-block">
                <div className="flex-between">
                  <p style={{fontWeight:600,flex:1}}>{i+1}. {q.question_text}</p>
                  <span className={"diff-badge diff-"+q.difficulty}>{q.difficulty}</span>
                </div>
                {q.image_url && <img className="q-image" src={q.image_url} alt="" />}
                {options.map(([label,text])=>{
                  let cls = "option-row";
                  if(label===q.correct_option) cls += " correct";
                  else if(label===q.selected_option) cls += " incorrect";
                  return <div key={label} className={cls}><span><strong>{label}.</strong> {text}</span></div>;
                })}
                {!q.selected_option && <p className="muted" style={{fontSize:".85rem"}}>You did not answer this question.</p>}
                <p className="muted" style={{fontSize:".85rem"}}>
                  {q.is_correct ? `Correct — earned ${Math.round(q.mark_value*100)/100} marks` : `Incorrect (0 marks)`}
                </p>
                {q.explanation && <p className="muted" style={{fontSize:".88rem",marginTop:".4em"}}><strong>Explanation:</strong> {q.explanation}</p>}
              </div>
            );
          })}
        </div>
      ))}
      <button className="btn-primary no-print" onClick={onExit}>Back to home</button>
    </div>
  );
}

function PracticeSetup({ user, onStart, onExit }){
  const [subjects,setSubjects] = useState([]);
  const [chosenIds,setChosenIds] = useState([]); // up to 4 subjects (English optional here)
  const [configs,setConfigs] = useState({}); // subjectId -> {count, year, topicId}
  const [topicsBySubject,setTopicsBySubject] = useState({});
  const [minutes,setMinutes] = useState(60);
  const [loading,setLoading] = useState(true);
  const [err,setErr] = useState("");
  const [preparing,setPreparing] = useState(false);

  useEffect(()=>{ (async()=>{
    const { data } = await sb.from("jamb_subjects").select("*").order("name");
    setSubjects(data||[]);
    setLoading(false);
  })(); },[]);

  async function loadTopics(subjectId){
    if(topicsBySubject[subjectId]) return;
    const { data } = await sb.from("jamb_topics").select("*").eq("subject_id",subjectId).order("name");
    setTopicsBySubject(prev=>({...prev,[subjectId]:data||[]}));
  }

  function toggleSubject(id){
    setChosenIds(prev=>{
      if(prev.includes(id)) return prev.filter(x=>x!==id);
      if(prev.length>=4){ setErr("You can practice up to 4 subjects at once."); return prev; }
      setErr("");
      setConfigs(c=>({...c,[id]: c[id] || {count:20, year:"", topicId:""}}));
      return [...prev, id];
    });
  }

  async function handleStart(){
    if(chosenIds.length===0){ setErr("Choose at least one subject."); return; }
    setErr(""); setPreparing(true);
    const subjectData = [];
    for(const id of chosenIds){
      const subj = subjects.find(s=>s.id===id);
      const cfg = configs[id] || {count:20, year:"", topicId:""};
      let query = sb.from("jamb_questions").select("*").eq("subject_id", id);
      if(cfg.topicId) query = query.eq("topic_id", cfg.topicId);
      if(cfg.year) query = query.eq("year", parseInt(cfg.year));
      const { data: pool } = await query;
      if(!pool || pool.length===0){ setErr(`No questions found for ${subj.name} with those filters.`); setPreparing(false); return; }
      const plan = buildDifficultyPlan(cfg.count);
      const seenIds = await getSeenQuestionIds(user.id, id, pool.length);
      const picked = pickQuestionsForPlan(pool, plan, seenIds);
      if(picked.length===0){ setErr(`Could not build a question set for ${subj.name} — try fewer questions or remove filters.`); setPreparing(false); return; }
      await recordSeenQuestions(user.id, id, picked);
      subjectData.push({ subject: subj, questions: picked, plan });
    }
    setPreparing(false);
    onStart({ subjectData, durationSeconds: minutes*60 });
  }

  if(loading) return <div className="empty-state"><span className="spinner"></span></div>;

  return (
    <div>
      <button className="btn-ghost" onClick={onExit}>← Back</button>
      <h1>Practice Mode</h1>
      <p className="muted">Choose up to 4 subjects, set how many questions, filter by topic or year, and set your time.</p>
      {err && <div className="error-box">{err}</div>}
      <div className="card">
        <div className="field">
          <label>Subjects ({chosenIds.length}/4 selected)</label>
          <div className="flex-row">
            {subjects.map(s=>(
              <span key={s.id} className={"subject-pill"+(chosenIds.includes(s.id)?" active":"")} onClick={()=>toggleSubject(s.id)}>{s.name}</span>
            ))}
          </div>
        </div>
        <div className="field">
          <label>Total time (minutes)</label>
          <input type="number" min="5" value={minutes} onChange={e=>setMinutes(parseInt(e.target.value)||60)} />
        </div>
      </div>
      {chosenIds.map(id=>(
        <SubjectConfigRow key={id} subject={subjects.find(s=>s.id===id)} config={configs[id]||{count:20,year:"",topicId:""}}
          onChange={(cfg)=>setConfigs(c=>({...c,[id]:cfg}))} topicsBySubject={topicsBySubject} loadTopics={loadTopics} />
      ))}
      {chosenIds.length>0 && <button className="btn-primary" onClick={handleStart} disabled={preparing} style={{marginTop:"1em"}}>{preparing?<span className="spinner"></span>:"Start practice"}</button>}
    </div>
  );
}

    const { data } = await sb.from("jamb_attempts").select("*").eq("user_id",user.id).eq("mode","weekly_challenge").eq("challenge_week", win.weekKey).maybeSingle();

      <div className="card">

}

function WeeklyChallengeSetup({ user, windowInfo, onStart, onExit }){
  const [subjects,setSubjects] = useState([]);
  const [chosen,setChosen] = useState([]);
  const [loading,setLoading] = useState(true);
  const [err,setErr] = useState("");
  const [preparing,setPreparing] = useState(false);

  useEffect(()=>{ (async()=>{
    const { data } = await sb.from("jamb_subjects").select("*").order("name");
    setSubjects(data||[]);
    setLoading(false);
  })(); },[]);

  const english = subjects.find(s=>s.is_compulsory);
  const others = subjects.filter(s=>!s.is_compulsory);

  function toggle(id){
    setChosen(prev=>{
      if(prev.includes(id)) return prev.filter(x=>x!==id);
      if(prev.length>=3){ setErr("Choose exactly 3 subjects besides English."); return prev; }
      setErr(""); return [...prev,id];
    });
  }

  async function handleStart(){
    if(!english){ setErr("English subject missing."); return; }
    if(chosen.length!==3){ setErr("Please choose exactly 3 subjects."); return; }
    setErr(""); setPreparing(true);
    const subjectPlan = [{ subject:english, questionCount:60 }, ...chosen.map(id=>({ subject: subjects.find(s=>s.id===id), questionCount:40 }))];
    const subjectData = [];
    for(const sp of subjectPlan){
      const { data: pool } = await sb.from("jamb_questions").select("*").eq("subject_id", sp.subject.id);
      if(!pool || pool.length===0){ setErr(`No questions found for ${sp.subject.name} yet.`); setPreparing(false); return; }
      const plan = buildDifficultyPlan(sp.questionCount);
      const seenIds = await getSeenQuestionIds(user.id, sp.subject.id, pool.length);
      const picked = pickQuestionsForPlan(pool, plan, seenIds);
      await recordSeenQuestions(user.id, sp.subject.id, picked);
      subjectData.push({ subject: sp.subject, questions: picked, plan });
    }
    setPreparing(false);
    const remainingMs = windowInfo.end - new Date();
    const remainingSeconds = Math.max(Math.floor(remainingMs/1000), 60);
    const durationSeconds = Math.min(2*3600, remainingSeconds);
    onStart({ subjectData, durationSeconds });
  }

  if(loading) return <div className="empty-state"><span className="spinner"></span></div>;

  return (
    <div>
      <button className="btn-ghost" onClick={onExit}>← Back</button>
      <h1>Weekly Mock Challenge</h1>
      <p className="muted">English (60Q) is compulsory. Choose 3 more subjects (40Q each). You must submit before 12:00PM today.</p>
      {err && <div className="error-box">{err}</div>}
      <div className="card">
        <div className="field"><label>Compulsory subject</label><span className="tag">{english?.name}</span></div>
        <div className="field">
          <label>Choose 3 other subjects ({chosen.length}/3)</label>
          <div className="flex-row">
            {others.map(s=> <span key={s.id} className={"subject-pill"+(chosen.includes(s.id)?" active":"")} onClick={()=>toggle(s.id)}>{s.name}</span>)}
          </div>
        </div>
        <button className="btn-primary" onClick={handleStart} disabled={preparing}>{preparing?<span className="spinner"></span>:"Start challenge"}</button>
      </div>
    </div>
  );
}

function useJambSubjectsAndTopics(){
  const [subjects,setSubjects] = useState([]);
  const [topicsBySubject,setTopicsBySubject] = useState({});
  useEffect(()=>{ (async()=>{
    const { data } = await sb.from("jamb_subjects").select("*").order("name");
    setSubjects(data||[]);
  })(); },[]);
  async function loadTopics(subjectId){
    const { data } = await sb.from("jamb_topics").select("*").eq("subject_id",subjectId).order("name");
    setTopicsBySubject(prev=>({...prev,[subjectId]:data||[]}));
    return data||[];
  }
  async function getOrCreateTopic(subjectId, name){
    if(!name || !name.trim()) return null;
    const trimmed = name.trim();
    const existing = (topicsBySubject[subjectId]||[]).find(t=>t.name.toLowerCase()===trimmed.toLowerCase());
    if(existing) return existing.id;
    const { data, error } = await sb.from("jamb_topics").insert({ subject_id:subjectId, name:trimmed }).select().single();
    if(error){ console.error(error); return null; }
    setTopicsBySubject(prev=>({...prev,[subjectId]:[...(prev[subjectId]||[]),data]}));
    return data.id;
  }
  return { subjects, topicsBySubject, loadTopics, getOrCreateTopic };
}

// ---------------------------------------------------------------------
// ADMIN: Bulk Parser (objective only, with Year + Difficulty)
// Format per question block:
// Subject:
// Topic:
// Year:
// Difficulty:
// Question:
// Option A
// Option B
// Option C
// Option D
// Option E
// Answer:
// Explanation:
// ---------------------------------------------------------------------
function parseBulkJamb(raw){
  const blocks = raw.split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  const parsed = [];
  const problems = [];
  blocks.forEach((block, bi)=>{
    const lines = block.split("\n").map(l=>l.trim()).filter(Boolean);
    const get = (prefix) => {
      const line = lines.find(l=> l.toLowerCase().startsWith(prefix.toLowerCase()));
      return line ? line.slice(line.indexOf(":")+1).trim() : "";
    };
    const subject = get("Subject:");
    const topic = get("Topic:");
    const yearRaw = get("Year:");
    const year = yearRaw ? parseInt(yearRaw.replace(/[^\d]/g,"")) : null;
    let difficulty = get("Difficulty:").toLowerCase();
    if(!["easy","moderate","difficult"].includes(difficulty)) difficulty = "moderate";
    const question = get("Question:");
    const answer = get("Answer:").toUpperCase().replace(/[^A-E]/g,"");
    const explanation = get("Explanation:");
    const opts = {};
    ["A","B","C","D","E"].forEach(label=>{
      const line = lines.find(l=> new RegExp(`^Option\\s*${label}\\b`, "i").test(l));
      if(line) opts[label] = line.replace(new RegExp(`^Option\\s*${label}[:\\.\\)]?\\s*`,"i"),"").trim();
    });
    if(!subject || !question || !opts.A || !opts.B || !opts.C || !opts.D || !answer){
      problems.push(`Block ${bi+1}: missing required field(s) (need Subject, Question, Option A-D, Answer).`);
      return;
    }
    parsed.push({ subject, topic, year, difficulty, question, opts, answer, explanation });
  });
  return { parsed, problems };
}

function AdminBulkParser(){
  const [raw,setRaw] = useState("");
  const [preview,setPreview] = useState(null);
  const [problems,setProblems] = useState([]);
  const [saving,setSaving] = useState(false);
  const [msg,setMsg] = useState("");

  function handlePreview(){
    const { parsed, problems } = parseBulkJamb(raw);
    setPreview(parsed); setProblems(problems); setMsg("");
  }

  async function handleSaveAll(){
    if(!preview || preview.length===0) return;
    setSaving(true); setMsg("");
    const { data: subjects } = await sb.from("jamb_subjects").select("*");
    const { data: allTopics } = await sb.from("jamb_topics").select("*");
    let topicsCache = allTopics || [];
    let saved=0, failed=0;
    for(const item of preview){
      const subj = (subjects||[]).find(s=> s.code.toLowerCase()===item.subject.toLowerCase().replace(/\s+/g,"") || s.name.toLowerCase()===item.subject.toLowerCase());
      if(!subj){ failed++; continue; }
      let topic_id = null;
      if(item.topic){
        let t = topicsCache.find(t=>t.subject_id===subj.id && t.name.toLowerCase()===item.topic.toLowerCase());
        if(!t){
          const { data: newTopic } = await sb.from("jamb_topics").insert({ subject_id:subj.id, name:item.topic }).select().single();
          if(newTopic){ t = newTopic; topicsCache.push(newTopic); }
        }
        topic_id = t ? t.id : null;
      }
      const { error } = await sb.from("jamb_questions").insert({
        subject_id: subj.id, topic_id, year: item.year, difficulty: item.difficulty,
        question_text: item.question,
        option_a: item.opts.A, option_b: item.opts.B, option_c: item.opts.C, option_d: item.opts.D,
        option_e: item.opts.E || null, correct_option: item.answer, explanation: item.explanation || null
      });
      if(error){ failed++; console.error(error); } else saved++;
    }
    setSaving(false);
    setMsg(`Saved ${saved} question(s).${failed>0?` ${failed} failed (check subject names match exactly).`:""}`);
    if(failed===0){ setRaw(""); setPreview(null); }
  }

  return (
    <div className="card">
      <h3>Bulk Parser</h3>
      <p className="muted">Paste multiple questions, separated by a blank line, in this format. Year and Difficulty are optional (defaults to "moderate" if left out).</p>
      <pre style={{background:"#f5f2e8",padding:"1em",borderRadius:"8px",fontSize:".82rem",overflowX:"auto"}}>
{`Subject: Mathematics
Topic: Algebra
Year: 2022
Difficulty: difficult
Question: Solve for x: 2x + 5 = 17
Option A: 5
Option B: 6
Option C: 7
Option D: 8
Option E: 9
Answer: B
Explanation: 2x = 12, so x = 6`}
      </pre>
      <div className="field"><label>Paste your questions</label><textarea rows="10" value={raw} onChange={e=>setRaw(e.target.value)}></textarea></div>
      <div className="flex-row">
        <button className="btn-secondary" onClick={handlePreview}>Preview</button>
        {preview && preview.length>0 && <button className="btn-primary" onClick={handleSaveAll} disabled={saving}>{saving?<span className="spinner"></span>:`Save all ${preview.length} question(s)`}</button>}
      </div>
      {msg && <div className="success-box" style={{marginTop:"1em"}}>{msg}</div>}
      {problems.length>0 && <div className="error-box" style={{marginTop:"1em"}}>{problems.map((p,i)=><div key={i}>{p}</div>)}</div>}
      {preview && (
        <div style={{marginTop:"1em"}}>
          <p className="muted">{preview.length} question(s) ready to save:</p>
          {preview.map((p,i)=>(
            <div key={i} className="card" style={{padding:"1em"}}>
              <div className="flex-between">
                <p style={{fontWeight:600,margin:0}}>{p.subject} {p.topic && `· ${p.topic}`}</p>
                <span className={"diff-badge diff-"+p.difficulty}>{p.difficulty}</span>
              </div>
              <p>{p.question}</p>
              <p className="muted" style={{fontSize:".85rem"}}>Year: {p.year||"—"} · Answer: {p.answer}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// =====================================================================
// ANTI-CHEAT WRAPPER
// Wraps any exam screen. If the user switches tabs/apps or minimizes
// the browser (visibilitychange -> hidden), a 3-second countdown shows
// the moment they're noticed to be gone. If they don't return before it
// hits 0, onForceSubmit() fires automatically with whatever they've
// answered so far. Returning in time cancels the countdown with no
// penalty.
// =====================================================================
function AntiCheatWrapper({ children, onForceSubmit }){
  const [countdown,setCountdown] = useState(null); // null = not counting down
  const triggeredRef = useRef(false);

  useEffect(()=>{
    function handleVisibilityChange(){
      if(document.hidden){
        setCountdown(3);
      } else {
        setCountdown(null); // came back in time, cancel
      }
    }
    document.addEventListener("visibilitychange", handleVisibilityChange);
    return ()=> document.removeEventListener("visibilitychange", handleVisibilityChange);
  },[]);

  useEffect(()=>{
    if(countdown === null) return;
    if(countdown <= 0){
      if(!triggeredRef.current){
        triggeredRef.current = true;
        onForceSubmit();
      }
      return;
    }
    const t = setTimeout(()=> setCountdown(c => c - 1), 1000);
    return ()=> clearTimeout(t);
  },[countdown, onForceSubmit]);

  return (
    <div>
      {children}
      {countdown !== null && countdown > 0 && (
        <div className="modal-overlay">
          <div className="modal-box" style={{textAlign:"center"}}>
            <h2 style={{color:"var(--warn)"}}>You left the exam screen</h2>
            <p>Return now or your exam will be submitted automatically in:</p>
            <div style={{fontSize:"3rem",fontWeight:700,fontFamily:"'Iowan Old Style',Georgia,serif",color:"var(--warn)"}}>{countdown}</div>
            <p className="muted">Switching tabs, apps, or minimizing during a session counts as leaving the screen.</p>
          </div>
        </div>
      )}
    </div>
  );
}

function FlashcardsScreen({ user, onExit }){
  const [subjects,setSubjects] = useState([]);
  const [subjectId,setSubjectId] = useState("");
  const [topics,setTopics] = useState([]);
  const [topicId,setTopicId] = useState("");
  const [cards,setCards] = useState([]);
  const [idx,setIdx] = useState(0);
  const [flipped,setFlipped] = useState(false);
  const [points,setPoints] = useState(0);

  useEffect(()=>{ (async()=>{
    const { data } = await sb.from("jamb_subjects").select("*").order("name");
    setSubjects(data||[]);
  })(); },[]);

  useEffect(()=>{
    if(!subjectId){ setTopics([]); return; }
    (async()=>{
      const { data } = await sb.from("jamb_topics").select("*").eq("subject_id", subjectId).order("name");
      setTopics(data||[]);
    })();
  },[subjectId]);

  async function loadCards(){
    if(!topicId) return;
    const { data } = await sb.from("jamb_questions").select("*").eq("topic_id", topicId);
    setCards((data||[]).sort(()=>Math.random()-0.5));
    setIdx(0); setFlipped(false);
    const { data: fp } = await sb.from("jamb_flashcard_progress").select("*").eq("user_id",user.id).eq("topic_id",topicId).maybeSingle();
    setPoints(fp?.points || 0);
  }

  async function markKnew(){
    const newPoints = points + 5;
    setPoints(newPoints);
    await sb.from("jamb_flashcard_progress").upsert({ user_id:user.id, topic_id:topicId, points:newPoints, updated_at:new Date().toISOString() }, { onConflict:"user_id,topic_id" });
    next();
  }
  function next(){ setFlipped(false); setIdx(i=> (i+1) % Math.max(cards.length,1)); }

  const card = cards[idx];

  return (
    <div>
      <button className="btn-ghost" onClick={onExit}>← Back</button>
      <h1>Flashcards</h1>
      <div className="card">
        <div className="card-grid grid-2">
          <div className="field">
            <label>Subject</label>
            <select value={subjectId} onChange={e=>{setSubjectId(e.target.value); setTopicId(""); setCards([]);}}>
              <option value="">Select…</option>
              {subjects.map(s=> <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Topic</label>
            <select value={topicId} onChange={e=>setTopicId(e.target.value)} disabled={!subjectId}>
              <option value="">Select…</option>
              {topics.map(t=> <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
        </div>
        <button className="btn-primary" onClick={loadCards} disabled={!topicId}>Load flashcards</button>
      </div>

      {cards.length>0 && card && (
        <div className="card" style={{textAlign:"center"}}>
          <span className="tag">★ {points} points</span>
          <p className="muted" style={{marginTop:"1em"}}>Card {idx+1} of {cards.length}</p>
          <div style={{minHeight:"120px",display:"flex",alignItems:"center",justifyContent:"center",padding:"1em"}}>
            <p style={{fontSize:"1.15rem",fontWeight:600}}>
              {flipped ? `Answer: ${card.correct_option} — ${ {A:card.option_a,B:card.option_b,C:card.option_c,D:card.option_d,E:card.option_e}[card.correct_option] }` : card.question_text}
            </p>
          </div>
          <div className="flex-row" style={{justifyContent:"center"}}>
            <button className="btn-secondary" onClick={()=>setFlipped(f=>!f)}>{flipped ? "Show question" : "Show answer"}</button>
            <button className="btn-secondary" onClick={next}>Skip</button>
            <button className="btn-primary" onClick={markKnew}>I knew this (+5)</button>
          </div>
        </div>
      )}
      {cards.length===0 && topicId && <div className="empty-state">No questions found for this topic yet.</div>}
    </div>
  );
}

          </div>
          {n.content && <p style={{marginTop:".6em"}}>{n.content}</p>}
          {n.image_url && <img className="q-image" src={n.image_url} alt="note attachment" />}
          <p className="muted" style={{fontSize:".78rem"}}>{new Date(n.created_at).toLocaleString()}</p>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
